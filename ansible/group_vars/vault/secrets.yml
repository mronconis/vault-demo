---
# Secret definitions — maps sensitive values from sensitive.yml to HashiCorp Vault KV2 paths.
# This file is plaintext (not encrypted) so that paths and structure are review-friendly.
#
# Each entry declares a KV2 secret on HashiCorp Vault:
#   path               – KV2 secret path (relative to engine mount)
#   engine_mount_point  – secrets engine mount (default: secret)
#   state               – present (default) or absent
#   purge               – true to permanently destroy (metadata + all versions); default: false
#   data                – key/value pairs (required when state: present)
#
vault_secret_definitions:
  - path: apps/database
    engine_mount_point: secret
    data:
      password: "{{ vault_sensitive_data.db_password }}"
      username: db_admin

  - path: apps/api
    engine_mount_point: secret
    data:
      api_key: "{{ vault_sensitive_data.api_key }}"

  - path: apps/redis
    engine_mount_point: secret
    data:
      password: "{{ vault_sensitive_data.redis_password }}"

  - path: apps/rabbitmq
    engine_mount_point: secret
    data:
      password: "{{ vault_sensitive_data.rabbitmq_password }}"
