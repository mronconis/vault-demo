---
name: Check Patchback Comment on Edit

on:
  issue_comment:
    types:
      - edited

jobs:
  check_patchback_comment:
    if: ${{
      github.event.issue.pull_request.merged_at &&
      github.event.comment.user.login == 'patchback[bot]' &&
      contains(github.event.comment.body, '💔 cherry-picking failed')
      }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Add backport_failed label
        # Using commit SHA instead of tag reference for security and SonarCloud compliance.
        # This prevents the action from being changed maliciously if the v1 tag is moved.
        # SHA 18f1af5e3544586314bbe15c0273249c770b2daf corresponds to v1 release.
        uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1
        with:
          labels: backport_failed
