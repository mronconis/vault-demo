---
# Main functionality tests for kv2_secret module
# This file tests the core features: create, read, update, delete operations

- name: Generate random string for this test run
  ansible.builtin.set_fact:
    random_string: "{{ lookup('password', '/dev/null chars=ascii_letters,digit length=12') | lower }}"

- name: Test kv2_secret module functionality
  vars:
    test_secret_path: "{{ secret_path }}-{{ random_string }}"
  block:
    - name: Create test secret
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        data: "{{ initial_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      register: secret_creation_result

    - name: Verify secret creation succeeded
      ansible.builtin.assert:
        that:
          - secret_creation_result.changed == true
          - secret_creation_result.raw is defined
        fail_msg: "Secret creation failed or returned unexpected data"

    - name: Create same secret again (idempotency test)
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        data: "{{ initial_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      register: secret_creation_idempotent_result

    - name: Verify secret creation idempotency
      ansible.builtin.assert:
        that:
          - secret_creation_idempotent_result.changed == false
          - secret_creation_idempotent_result.msg == "Secret already exists with the same data"
        fail_msg: "Secret creation idempotency failed - should return changed=false for identical data"

    - name: Update test secret
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        data: "{{ updated_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      register: secret_update_result

    - name: Verify secret update succeeded
      ansible.builtin.assert:
        that:
          - secret_update_result.changed == true
          - secret_update_result.raw is defined
        fail_msg: "Secret update failed or returned unexpected data"

    - name: Update secret with same data (idempotency test)
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        data: "{{ updated_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      register: secret_update_idempotent_result

    - name: Verify secret update idempotency
      ansible.builtin.assert:
        that:
          - secret_update_idempotent_result.changed == false
          - secret_update_idempotent_result.msg == "Secret already exists with the same data"
        fail_msg: "Secret update idempotency failed - should return changed=false for identical data"

    - name: Delete test secret
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: absent
      register: secret_deletion_result

    - name: Verify secret deletion succeeded
      ansible.builtin.assert:
        that:
          - secret_deletion_result.changed == true
          - secret_deletion_result.msg == "Secret deleted (soft-deleted) successfully"
        fail_msg: "Secret deletion failed or returned unexpected message"

    - name: Delete same secret again (idempotency test)
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: absent
      register: secret_deletion_idempotent_result

    - name: Verify secret deletion idempotency
      ansible.builtin.assert:
        that:
          - secret_deletion_idempotent_result.changed == false
          - secret_deletion_idempotent_result.msg == "Secret already absent"
        fail_msg: "Secret deletion idempotency failed - should return changed=false for non-existent secret"

    - name: Create secret after deletion (verify clean state)
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        data: "{{ initial_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      register: secret_recreate_result

    - name: Verify secret recreation succeeded
      ansible.builtin.assert:
        that:
          - secret_recreate_result.changed == true
          - secret_recreate_result.raw is defined
        fail_msg: "Secret recreation failed after deletion"

    - name: Final cleanup - Delete recreated secret
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: absent
      register: final_cleanup_result

    - name: Permanently delete the secret metadata and all versions
      ansible.builtin.uri:
        url: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') | default(vault_url, true) }}/v1/{{ secret_mount_path }}/metadata/{{ test_secret_path }}" # noqa: yaml[line-length]
        method: DELETE
        headers:
          X-Vault-Token: "{{ lookup('ansible.builtin.env', 'VAULT_TOKEN') | default(vault_token_from_setup_auth_token, true) }}"
          X-Vault-Namespace: "{{ lookup('ansible.builtin.env', 'VAULT_NAMESPACE') | default(vault_namespace, true) }}"
        return_content: true
        status_code: [204]
      no_log: true
      register: secret_metadata_deletion_result

    - name: "=== CHECK MODE TESTS ==="
      ansible.builtin.debug:
        msg: "Testing check mode functionality"

    - name: Test check mode - create secret (should show changes without creating)
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        path: "{{ test_secret_path }}-checkmode"
        data: "{{ initial_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      check_mode: true
      register: check_mode_create_result

    - name: Assert check mode create shows changes
      ansible.builtin.assert:
        that:
          - check_mode_create_result.changed == true
          - check_mode_create_result.msg is search("check_mode")
        fail_msg: "Check mode create should show changed=true with check_mode message"

    - name: Actually create secret for update/delete check mode tests
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        path: "{{ test_secret_path }}-checkmode"
        data: "{{ initial_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      register: actual_create_for_check_mode

    - name: Test check mode - update secret (should show changes without updating)
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        path: "{{ test_secret_path }}-checkmode"
        data: "{{ updated_data }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: present
      check_mode: true
      register: check_mode_update_result

    - name: Assert check mode update shows changes
      ansible.builtin.assert:
        that:
          - check_mode_update_result.changed == true
          - check_mode_update_result.msg is search("check_mode")
        fail_msg: "Check mode update should show changed=true with check_mode message"

    - name: Test check mode - delete secret (should show changes without deleting)
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        path: "{{ test_secret_path }}-checkmode"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: absent
      check_mode: true
      register: check_mode_delete_result

    - name: Assert check mode delete shows changes
      ansible.builtin.assert:
        that:
          - check_mode_delete_result.changed == true
          - check_mode_delete_result.msg is search("check_mode")
        fail_msg: "Check mode delete should show changed=true with check_mode message"

  rescue:
    - name: Cleanup - Ensure test secret is removed on failure
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        # Authentication parameters - set by calling context
        auth_method: "{{ test_auth_method | default(omit) }}"
        token: "{{ test_token | default(omit) }}"
        role_id: "{{ test_role_id | default(omit) }}"
        secret_id: "{{ test_secret_id | default(omit) }}"
        # Test parameters
        path: "{{ test_secret_path }}"
        secret_mount_path: "{{ secret_mount_path }}"
        vault_approle_path: "{{ integration_tests_approle }}"
        namespace: "{{ vault_namespace }}"
        state: absent
      failed_when: false

    - name: Re-raise the original error
      ansible.builtin.fail:
        msg: "kv2_secret test failed"
