---
- name: Create test secret
  hashicorp.vault.kv2_secret:
    url: "{{ vault_url }}"
    namespace: "{{ vault_namespace }}"
    auth_method: token
    token: "{{ vault_token_from_setup_auth_token }}"
    path: "{{ test_secret_path }}"
    data: "{{ item }}"
    secret_mount_path: "{{ secret_mount_path }}"
    state: present
  loop: "{{ test_secret_data | flatten(levels=1) }}"
  register: secrets

- name: Read the test secret
  hashicorp.vault.kv2_secret_info:
    url: "{{ vault_url }}"
    namespace: "{{ vault_namespace }}"
    auth_method: token
    token: "{{ vault_token_from_setup_auth_token }}"
    path: "{{ test_secret_path }}"
    secret_mount_path: "{{ secret_mount_path }}"
  register: secret_info

- name: Test kv2_secret_get lookup plugin
  block:
    - name: Read the latest version of the secret
      ansible.builtin.set_fact:
        secret_response: "{{ lookup('hashicorp.vault.kv2_secret_get',
          auth_method='token',
          token=vault_token_from_setup_auth_token,
          secret=test_secret_path,
          secret_mount_path=secret_mount_path,
          namespace=vault_namespace,
          url=vault_url) }}"

    - name: Ensure the secret data matches as expected
      ansible.builtin.assert:
        that:
          - secret_response.data == test_secret_data[-1]

    - name: Read a specific version (first) of the secret
      ansible.builtin.set_fact:
        secret_first_version: "{{ lookup('hashicorp.vault.kv2_secret_get',
          auth_method='token',
          token=vault_token_from_setup_auth_token,
          secret=test_secret_path,
          secret_mount_path=secret_mount_path,
          namespace=vault_namespace,
          version=1,
          url=vault_url) }}"

    - name: Ensure the secret data matches as expected for version 1
      ansible.builtin.assert:
        that:
          - secret_first_version.data == test_secret_data[0]

    - name: Test kv2_secret_get lookup plugin with AppRole authentication (role_id and secret_id)
      block:
        - name: Read the secret via lookup using AppRole role_id and secret_id
          ansible.builtin.set_fact:
            secret_response_approle:
              "{{ lookup('hashicorp.vault.kv2_secret_get',
              auth_method='approle',
              role_id=vault_approle_role_id,
              secret_id=vault_approle_secret_id,
              secret=test_secret_path,
              secret_mount_path=secret_mount_path,
              namespace=vault_namespace,
              url=vault_url,
              vault_approle_path=vault_approle_auth_path) }}"

        - name: Ensure the secret data matches when using AppRole lookup
          ansible.builtin.assert:
            that:
              - secret_response_approle.data == test_secret_data[-1]
      when: vault_approle_role_id is defined and vault_approle_secret_id is defined

  always:
    - name: Delete the test secret
      hashicorp.vault.kv2_secret:
        url: "{{ vault_url }}"
        auth_method: token
        token: "{{ vault_token_from_setup_auth_token }}"
        path: "{{ test_secret_path }}"
        secret_mount_path: "{{ secret_mount_path }}"
        namespace: "{{ vault_namespace }}"
        state: absent

    - name: Permanently delete the secret metadata and all versions
      ansible.builtin.uri:
        url: "{{ vault_url }}/v1/{{ secret_mount_path }}/metadata/{{ test_secret_path }}"
        method: DELETE
        headers:
          X-Vault-Token: "{{ vault_token_from_setup_auth_token }}"
          X-Vault-Namespace: "{{ vault_namespace }}"
        return_content: true
        status_code: [204]
      no_log: true
      register: secret_metadata_deletion_result
