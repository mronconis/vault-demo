---
- name: Create temporary file for compose containers configuration
  ansible.builtin.tempfile:
    suffix: .compose
    state: directory
  register: ansible_test_tmp_dir
  notify: 'Clean resources'

# Create container network
- name: Create container network
  ansible.builtin.command: >-
    {{ container_runtime }} network create {{ ansible_test_container_network }}

# Vault server
- name: Deploy vault dev server
  ansible.builtin.command: >-
    {{ container_runtime }} run --name {{ ansible_test_vault_container_name }} -d \
    --network {{ ansible_test_container_network }} \
    -e 'SKIP_SETCAP=true' \
    -e 'VAULT_LOCAL_CONFIG={"disable_mlock": true}' \
    -p 8200:8200 -e VAULT_DEV_ROOT_TOKEN_ID="{{ ansible_test_vault_root_token }}" \
    docker.io/hashicorp/vault:latest

- name: Vault enable databse engine
  vault_http_request:
    url: "{{ ansible_test_vault_url }}/v1/sys/mounts/database"
    method: POST
    token: "{{ ansible_test_vault_root_token }}"
    payload:
      type: "database"
      description: "Database secrets engine"
  register: result
  retries: 10
  delay: 3
  until: result is successful


# PostGreSQL
- name: Generate init-user.sql file
  ansible.builtin.template:
    src: init-user.sql.j2
    dest: "{{ ansible_test_tmp_dir.path }}/init-user.sql"
    mode: '0644'
  
- name: Deploy the PostGreSQL container
  ansible.builtin.command: >-
    {{ container_runtime }} run --name {{ ansible_test_postgres_container_name }} -d \
    --network {{ ansible_test_container_network }} \
    -p 5432:5432 \
    -e POSTGRES_USER={{ ansible_test_db_admin_user }} \
    -e POSTGRES_PASSWORD={{ ansible_test_db_admin_user_password }} \
    -v {{ ansible_test_tmp_dir.path }}/init-user.sql:/docker-entrypoint-initdb.d/init-user.sql:Z \
    docker.io/postgres:17-alpine

- name: Validate connection to PostGreSQL
  postgres_connect:
    db_user: "{{ item.user }}"
    db_user_password: "{{ item.password }}"
  loop:
    - user: "{{ ansible_test_db_admin_user }}"
      password: "{{ ansible_test_db_admin_user_password }}"
    - user: "{{ ansible_test_db_user }}"
      password: "{{ ansible_test_db_user_password }}"
