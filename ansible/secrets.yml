---
#
# Reconcile secrets on HashiCorp Vault with Ansible definitions (single source of truth).
#
# Each entry in vault_secret_definitions declares its desired state:
#   state: present  – create or update the secret (default)
#   state: absent   – soft-delete the latest version (default)
#   purge: true     – permanently destroy the secret (metadata + all versions)
#
# Sensitive values live in group_vars/vault/sensitive.yml (ansible-vault encrypted).
# Secret definitions (paths, engine, key mapping) live in group_vars/vault/secrets.yml.
# Ansible auto-loads all files under group_vars/vault/ for the vault host group.
#
# Prerequisites: Vault cluster initialised, unsealed, and KV2 enabled (initialize.yml).
#
# Usage:
#   make secrets
#
- name: Reconcile secrets on HashiCorp Vault
  hosts: all
  run_once: true
  become: true
  vars:
    vault_addr: "http://127.0.0.1:{{ vault_api_port }}"
    vault_credentials_file: "{{ playbook_dir }}/../.vault-credentials.json"

  collections:
    - hashicorp.vault

  tasks:

    - name: Install requests library on target
      ansible.builtin.apt:
        name: python3-requests
        state: present

    - name: Load credentials
      ansible.builtin.slurp:
        src: "{{ vault_credentials_file }}"
      register: creds_raw
      delegate_to: localhost
      become: false

    - name: Set root token
      ansible.builtin.set_fact:
        vault_root_token: "{{ (creds_raw.content | b64decode | from_json).root_token }}"

    # ── Write secrets (state: present) ─────────────────────────────────────

    - name: Write secrets to Vault
      hashicorp.vault.kv2_secret:
        path: "{{ item.path }}"
        data: "{{ item.data }}"
        engine_mount_point: "{{ item.engine_mount_point | default('secret') }}"
        url: "{{ vault_addr }}"
        token: "{{ vault_root_token }}"
      loop: "{{ vault_secret_definitions | selectattr('state', 'undefined') | list + vault_secret_definitions | selectattr('state', 'defined') | selectattr('state', 'eq', 'present') | list }}"
      loop_control:
        label: "{{ item.engine_mount_point | default('secret') }}/{{ item.path }}"
      no_log: "{{ no_log_override | default(true) }}"

    # ── Soft-delete secrets (state: absent, purge: false) ───────────────────

    - name: Soft-delete secrets from Vault
      hashicorp.vault.kv2_secret:
        path: "{{ item.path }}"
        engine_mount_point: "{{ item.engine_mount_point | default('secret') }}"
        state: absent
        url: "{{ vault_addr }}"
        token: "{{ vault_root_token }}"
      loop: "{{ vault_secret_definitions | selectattr('state', 'defined') | selectattr('state', 'eq', 'absent') | rejectattr('purge', 'defined') | list + vault_secret_definitions | selectattr('state', 'defined') | selectattr('state', 'eq', 'absent') | selectattr('purge', 'defined') | rejectattr('purge', 'eq', true) | list }}"
      loop_control:
        label: "{{ item.engine_mount_point | default('secret') }}/{{ item.path }}"

    # ── Hard-delete secrets (state: absent, purge: true) ─────────────────

    - name: Permanently delete secrets from Vault (metadata + all versions)
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/{{ item.engine_mount_point | default('secret') }}/metadata/{{ item.path }}"
        method: DELETE
        headers:
          X-Vault-Token: "{{ vault_root_token }}"
        status_code: [204, 404]
      loop: "{{ vault_secret_definitions | selectattr('state', 'defined') | selectattr('state', 'eq', 'absent') | selectattr('purge', 'defined') | selectattr('purge', 'eq', true) | list }}"
      loop_control:
        label: "{{ item.engine_mount_point | default('secret') }}/{{ item.path }}"
      register: purge_results
      changed_when: purge_results.status == 204

    # ── Summary ────────────────────────────────────────────────────────────

    - name: Reconciliation summary
      vars:
        _present: "{{ vault_secret_definitions | selectattr('state', 'undefined') | list + vault_secret_definitions | selectattr('state', 'defined') | selectattr('state', 'eq', 'present') | list }}"
        _absent: "{{ vault_secret_definitions | selectattr('state', 'defined') | selectattr('state', 'eq', 'absent') | list }}"
        _purged: "{{ _absent | selectattr('purge', 'defined') | selectattr('purge', 'eq', true) | list }}"
        _soft: "{{ _absent | rejectattr('purge', 'defined') | list + _absent | selectattr('purge', 'defined') | rejectattr('purge', 'eq', true) | list }}"
      ansible.builtin.debug:
        msg: >-
          {{ _present | length }} written
          ({{ _present | map(attribute='path') | join(', ') }}).
          {{ _soft | length }} soft-deleted
          {{ '(' ~ (_soft | map(attribute='path') | join(', ')) ~ ')' if _soft | length > 0 else '' }}.
          {{ _purged | length }} purged
          {{ '(' ~ (_purged | map(attribute='path') | join(', ')) ~ ')' if _purged | length > 0 else '' }}.
